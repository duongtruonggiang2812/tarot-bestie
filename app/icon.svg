<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="ball" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="50%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#3b0764"/>
    </radialGradient>
    <radialGradient id="shine" cx="35%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f0a1e"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Stars -->
  <circle cx="5" cy="5" r="0.8" fill="#e9d5ff" opacity="0.8"/>
  <circle cx="27" cy="4" r="0.6" fill="#e9d5ff" opacity="0.6"/>
  <circle cx="25" cy="10" r="0.5" fill="#c084fc" opacity="0.7"/>
  <circle cx="4" cy="12" r="0.5" fill="#e9d5ff" opacity="0.5"/>
  <circle cx="28" cy="20" r="0.6" fill="#e9d5ff" opacity="0.6"/>
  <circle cx="3" cy="22" r="0.4" fill="#c084fc" opacity="0.5"/>

  <!-- Crystal ball -->
  <circle cx="16" cy="15" r="10" fill="url(#ball)"/>

  <!-- Shine -->
  <circle cx="16" cy="15" r="10" fill="url(#shine)"/>

  <!-- Inner glow lines -->
  <circle cx="16" cy="15" r="10" fill="none" stroke="#a855f7" stroke-width="0.4" opacity="0.4"/>

  <!-- Star inside ball -->
  <text x="16" y="19" text-anchor="middle" font-size="8" fill="#f3e8ff" opacity="0.9">✦</text>

  <!-- Base/stand -->
  <ellipse cx="16" cy="25.5" rx="5" ry="1.5" fill="#4c1d95" opacity="0.8"/>
  <rect x="14" y="24.5" width="4" height="2" rx="1" fill="#5b21b6" opacity="0.9"/>
</svg>
